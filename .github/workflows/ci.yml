name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────
  # Backend: Lint + Syntax Check
  # ────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: ruff check . --output-format=github

      - name: Syntax check all modules
        run: |
          python -c "
          import ast, pathlib
          files = list(pathlib.Path('.').glob('*.py'))
          for f in files:
              ast.parse(f.read_text())
          print(f'✅ All {len(files)} Python files parse OK')
          "

  # ────────────────────────────────
  # Frontend: Lint + Build
  # ────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ────────────────────────────────
  # Docker: Build Images
  # ────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t d2c-voice-agent-backend ./backend

      - name: Build frontend image
        run: docker build -t d2c-voice-agent-frontend ./frontend

      - name: Verify backend health check
        run: |
          echo "Docker images built successfully ✅"
          docker images | grep d2c-voice-agent
